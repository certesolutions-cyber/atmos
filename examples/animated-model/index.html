<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atmos – Animated Model</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #111; display: flex; flex-direction: column; align-items: center; height: 100vh; }
    canvas { width: 800px; height: 600px; }
    #ui {
      position: fixed; top: 12px; left: 12px; color: #fff;
      font: 14px sans-serif; z-index: 1;
      display: flex; gap: 8px; align-items: center;
    }
    #status { opacity: 0.7; }
    button { padding: 6px 12px; cursor: pointer; }
    #credits {
      position: fixed; bottom: 12px; left: 12px; color: #fff;
      font: 12px sans-serif; opacity: 0.5; z-index: 1;
    }
    #credits a { color: #adf; }
  </style>
</head>
<body>
  <div id="ui">
    <button id="load-btn">Load .glb</button>
    <select id="anim-select" style="display:none"></select>
    <span id="status">Place a .glb in models/ or click Load</span>
  </div>
  <canvas id="canvas" width="800" height="600"></canvas>
  <div id="credits">
    Model: <a href="https://skfb.ly/pGHXu" target="_blank">"Poppy Playtime (Chapter 5) Chum Chompkins"</a>
    by ur_daughter, licensed under <a href="http://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY 4.0</a>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
