<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atmos – Audio Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #eee;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    h1 { font-size: 1.2rem; margin-bottom: 8px; color: #aaa; }
    canvas { width: 800px; height: 500px; border-radius: 8px; }

    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 10;
    }
    #overlay span {
      font-size: 1.5rem;
      color: #fff;
      padding: 20px 40px;
      border: 2px solid #fff;
      border-radius: 12px;
      transition: background 0.2s;
    }
    #overlay:hover span { background: rgba(255,255,255,0.1); }

    .controls {
      margin-top: 12px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .control-group {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 16px;
      min-width: 160px;
    }
    .control-group h3 {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .control-group label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 4px;
    }
    .control-group input[type="range"] {
      width: 100%;
      accent-color: #4af;
    }
    .control-group button {
      margin-top: 6px;
      padding: 4px 12px;
      background: #333;
      color: #eee;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .control-group button:hover { background: #444; }

    .sine-color { border-color: #f44; }
    .sine-color h3 { color: #f66; }
    .square-color { border-color: #4f4; }
    .square-color h3 { color: #6f6; }
    .noise-color { border-color: #44f; }
    .noise-color h3 { color: #66f; }

    #status {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Atmos Audio Demo — Spatial 3D Sound</h1>
  <div style="position: relative; display: inline-block;">
    <canvas id="canvas" width="800" height="500"></canvas>
    <div id="overlay"><span>Click to start audio</span></div>
  </div>

  <div class="controls">
    <div class="control-group">
      <h3>Master</h3>
      <label>Volume</label>
      <input type="range" id="master-vol" min="0" max="1" step="0.01" value="1" />
    </div>

    <div class="control-group sine-color">
      <h3>Sine 440 Hz (orbiting)</h3>
      <label>Volume</label>
      <input type="range" id="sine-vol" min="0" max="1" step="0.01" value="0.6" />
      <button id="toggle-sine">Play / Stop</button>
    </div>

    <div class="control-group square-color">
      <h3>Square 220 Hz (static)</h3>
      <label>Volume</label>
      <input type="range" id="square-vol" min="0" max="1" step="0.01" value="0.4" />
      <button id="toggle-square">Play / Stop</button>
    </div>

    <div class="control-group noise-color">
      <h3>Noise burst (orbiting)</h3>
      <label>Volume</label>
      <input type="range" id="noise-vol" min="0" max="1" step="0.01" value="0.3" />
      <button id="toggle-noise">Play / Stop</button>
    </div>
  </div>

  <div id="status">Click to start</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
