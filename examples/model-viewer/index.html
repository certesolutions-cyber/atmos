<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atmos – Model Viewer</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #111; display: flex; flex-direction: column; align-items: center; height: 100vh; }
    canvas { width: 800px; height: 600px; }
    #ui { position: fixed; top: 12px; left: 12px; color: #fff; font: 14px sans-serif; z-index: 1; }
    #drop-zone {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: none; justify-content: center; align-items: center;
      background: rgba(0,0,0,0.7); color: #fff; font: bold 24px sans-serif; z-index: 10;
    }
    #drop-zone.active { display: flex; }
    button { margin: 4px; padding: 6px 12px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="ui">
    <button id="load-btn">Load .glb file</button>
    <span id="status">Drop a .glb file or click Load</span>
  </div>
  <div id="drop-zone">Drop .glb file here</div>
  <canvas id="canvas" width="800" height="600"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
